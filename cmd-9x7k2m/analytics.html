function rCashflow(){const d=fc(12);const lowest=Math.min(...d.map(m=>m.cash));const lm=d.find(m=>m.cash===lowest);const be=d.findIndex(m=>m.net>0);

function rDebt(){return`<div class="grid1">

</div><div class="grid1" style="margin-top:16px"><div class="card span2"><div class="card-acc" style="background:var(--green)"></div><div class="card-h">Revenue Projection</div><div class="card-b"><div class="chart-wrap"><canvas id="forecastChart"></canvas></div></div></div></div>`}
function rScenarios(){const sc=[{n:"Pessimistic",c:"#FF6B6B",cv:.04,ld:15,note:"4% conv, 15 leads/mo"},{n:"Base Case",c:"#C9A84C",cv:.08,ld:30,note:"8% conv, 30 leads/mo"},{n:"Optimistic",c:"#4ECB71",cv:.12,ld:45,note:"12% conv, 45 leads/mo"}];
const sd=sc.map(s=>{let cash=R.liquid;const pts=[];for(let i=0;i<12;i++){const ramp=Math.min(1,.2+i*.12);const rev=Math.round(s.ld*ramp)*s.cv*150000*.4;let out=8940+2550;if(i<4)out+=16500;if(i<9)out+=4800;if(i>=4)out+=22083;let inf=rev;if(i===1||i===4||i===7||i===10)inf+=32000;if(i===3)inf+=85000;cash+=inf-out;pts.push(Math.round(cash))}return{...s,pts,end:Math.round(cash)}});
return`<div class="grid">${sd.map(s=>`<div class="card"><div class="card-acc" style="background:${s.c}"></div><div class="card-h">${s.n}</div><div class="card-b"><div style="font-size:11px;color:var(--muted);margin-bottom:8px">${s.note}</div><div class="met"><div class="mv" style="color:${s.end>0?'var(--green)':'var(--red)'}">AED ${s.end.toLocaleString()}</div><div class="ml">End Cash (12 months)</div></div><div class="alert ${s.end>0?'a-green':'a-red'}">${s.end>0?'Sustainable':'Cash runs out'}</div></div></div>`).join('')}</div><div class="grid1" style="margin-top:16px"><div class="card span2"><div class="card-acc" style="background:var(--purple)"></div><div class="card-h">Scenario Comparison</div><div class="card-b"><div class="chart-wrap"><canvas id="scenarioChart"></canvas></div></div></div></div>`}
function rTimeline(){const ev=[{d:"7 Mar",l:"TODAY",t:"info",dt:"Houston & Sarah live. Systems wired."},{d:"10 Mar",l:"Google Ads Launch",t:"rev",dt:"Swimming Pool first. AED 85/day."},{d:"22 Mar",l:"RERA Payment",t:"debt",dt:"AED 4,800"},{d:"31 Mar",l:"Tareq Payment #1",t:"debt",dt:"AED 16,500"},{d:"1 Apr",l:"AMC Income",t:"inc",dt:"AED 32,000 (committed)"},{d:"22 Apr",l:"RERA Payment",t:"debt",dt:"AED 4,800"},{d:"30 Apr",l:"Tareq Payment #2",t:"debt",dt:"AED 16,500"},{d:"22 May",l:"RERA Payment",t:"debt",dt:"AED 4,800"},{d:"31 May",l:"Tareq Payment #3",t:"debt",dt:"AED 16,500"},{d:"Jun",l:"Avant Corp Recovery",t:"inc",dt:"AED 85,000 — GAME CHANGER"},{d:"30 Jun",l:"Tareq FINAL",t:"mile",dt:"AED 16,500 — TAREQ CLEARED ✓"},{d:"Jul",l:"FREEDOM MONTH",t:"mile",dt:"AMC available. Start Dana/CK. Travel ban clearable."},{d:"Nov 26",l:"RERA CLEARED",t:"mile",dt:"Final payment ✓"},{d:"Jun 28",l:"DEBT FREE",t:"mile",dt:"All commercial debt cleared ✓"}];
const col={debt:"var(--red)",inc:"var(--green)",mile:"var(--gold)",info:"var(--blue)",rev:"var(--cyan)"};
return`<div class="grid1"><div class="card span2"><div class="card-acc" style="background:var(--gold)"></div><div class="card-h">Payment & Milestone Timeline</div><div class="card-b">${ev.map(e=>`<div style="display:flex;gap:16px;padding:10px 0;border-bottom:1px solid rgba(42,58,82,.2)"><div style="min-width:70px;text-align:right"><div class="mono" style="font-size:11px;color:${col[e.t]};font-weight:700">${e.d}</div></div><div style="width:3px;background:${col[e.t]};border-radius:2px;flex-shrink:0"></div><div><div style="font-size:13px;font-weight:700;color:${col[e.t]}">${e.l}</div><div style="font-size:12px;color:var(--muted)">${e.dt}</div></div></div>`).join('')}</div></div></div>`}
function buildCharts(){const opts={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8899AA',font:{size:11}}}},scales:{x:{ticks:{color:'#6B7B8D',font:{size:10}},grid:{color:'#2A3A5220'}},y:{ticks:{color:'#6B7B8D',font:{size:10},callback:v=>'AED '+(v/1000).toFixed(0)+'K'},grid:{color:'#2A3A5240'}}}};
if(activeTab==="cashflow"){const ctx=document.getElementById("cashChart");if(ctx){const d=fc(12);charts.c=new Chart(ctx,{type:"line",data:{labels,datasets:[{label:"Cash Balance",data:d.map(m=>m.cash),borderColor:"#4ECDC4",backgroundColor:"#4ECDC410",fill:true,borderWidth:2,tension:.3},{label:"Monthly Net",data:d.map(m=>m.net),type:"bar",backgroundColor:d.map(m=>m.net>=0?"#4ECB7160":"#FF6B6B60"),borderColor:d.map(m=>m.net>=0?"#4ECB71":"#FF6B6B"),borderWidth:1}]},options:opts})}}
if(activeTab==="debt"){const ctx=document.getElementById("debtChart");if(ctx){let tot=R.travelBanTotal+66000+530000+17790;const dd=[];for(let i=0;i<12;i++){if(i<4)tot-=16500;if(i<9)tot-=4800;if(i>=4)tot-=22083;if(i===3)tot-=85000;dd.push(Math.max(0,Math.round(tot)))}charts.d=new Chart(ctx,{type:"line",data:{labels,datasets:[{label:"Total Debt",data:dd,borderColor:"#FF6B6B",backgroundColor:"#FF6B6B10",fill:true,borderWidth:2,tension:.3}]},options:opts})}}
if(activeTab==="forecast"){const ctx=document.getElementById("forecastChart");if(ctx){const d=fc(12);charts.f=new Chart(ctx,{type:"bar",data:{labels,datasets:[{label:"Revenue",data:d.map(m=>m.rev),backgroundColor:"#4ECB7180",borderColor:"#4ECB71",borderWidth:1},{label:"Profit (40%)",data:d.map(m=>m.rev*.4),backgroundColor:"#4ECDC480",borderColor:"#4ECDC4",borderWidth:1}]},options:opts})}}
if(activeTab==="scenarios"){const ctx=document.getElementById("scenarioChart");if(ctx){const sc=[{n:"Pessimistic",c:"#FF6B6B",cv:.04,ld:15},{n:"Base Case",c:"#C9A84C",cv:.08,ld:30},{n:"Optimistic",c:"#4ECB71",cv:.12,ld:45}];const ds=sc.map(s=>{let cash=R.liquid;const pts=[];for(let i=0;i<12;i++){const ramp=Math.min(1,.2+i*.12);const rev=Math.round(s.ld*ramp)*s.cv*150000*.4;let out=8940+2550;if(i<4)out+=16500;if(i<9)out+=4800;if(i>=4)out+=22083;let inf=rev;if(i===1||i===4||i===7||i===10)inf+=32000;if(i===3)inf+=85000;cash+=inf-out;pts.push(Math.round(cash))}return{label:s.n,data:pts,borderColor:s.c,backgroundColor:"transparent",borderWidth:2,tension:.3}});charts.s=new Chart(ctx,{type:"line",data:{labels,datasets:ds},options:opts})}}}
document.getElementById("tabs").addEventListener("click",e=>{if(e.target.classList.contains("tab")){document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));e.target.classList.add("active");activeTab=e.target.dataset.t;render()}});
render();
</script>
