<!DOCTYPE html>
<html lang="en">
<head>
<script type="text/javascript">(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);})(window, document, "clarity", "script", "vu6ig3av5y");</script>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta charset="UTF-8">

<title>FUG Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#0A1628;--navy-l:#132240;--navy-m:#1A2D4A;--slate:#2A3A52;--gold:#C9A84C;--gold-dim:#9A7B2F;--white:#F0F0F0;--muted:#6B7B8D;--green:#4ECB71;--red:#FF6B6B;--cyan:#4ECDC4;--orange:#FFB347;--blue:#60A5FA;--purple:#A78BFA}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--navy);color:var(--white);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh}.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--navy)}::-webkit-scrollbar-thumb{background:var(--slate);border-radius:3px}
.header{background:linear-gradient(135deg,var(--navy),var(--navy-l));border-bottom:1px solid var(--slate);padding:20px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--slate);padding:0 28px;background:var(--navy-l);overflow-x:auto}
.tab{background:none;border:none;color:var(--muted);padding:14px 18px;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap}.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.content{padding:24px 28px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}.grid1{display:grid;grid-template-columns:1fr;gap:16px}
@media(max-width:700px){.span2{grid-column:span 1!important}}
.card{background:var(--navy-l);border-radius:16px;border:1px solid var(--slate);overflow:hidden;position:relative}.span2{grid-column:span 2}
.card-acc{position:absolute;top:0;left:0;right:0;height:3px}.card-h{padding:18px 22px 6px;font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;font-weight:700}.card-b{padding:0 22px 18px}
.mv{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace}.ml{font-size:12px;color:var(--muted);margin-top:2px}.ms{font-size:11px;color:var(--gold-dim);margin-top:4px}.met{margin-bottom:12px}
.alert{margin-top:10px;padding:8px 12px;border-radius:8px;font-size:11px;font-weight:600}
.a-red{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.2);color:var(--red)}.a-green{background:rgba(78,203,113,.08);border:1px solid rgba(78,203,113,.2);color:var(--green)}.a-gold{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);color:var(--gold)}
table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;padding:8px 10px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--slate);font-size:10px;letter-spacing:1px;text-transform:uppercase}td{padding:7px 10px;border-bottom:1px solid rgba(42,58,82,.15)}.tdr{text-align:right}
.row{display:flex;gap:20px;flex-wrap:wrap}.pv{font-size:17px;font-weight:700;font-family:'JetBrains Mono',monospace}.pl{font-size:10px;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.footer{padding:16px 28px;border-top:1px solid var(--slate);text-align:center;font-size:10px;color:var(--muted);letter-spacing:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="header">
<div><div style="font-size:10px;letter-spacing:4px;color:var(--gold-dim);text-transform:uppercase">First Unicorn Group</div><div style="font-size:22px;font-weight:800;color:var(--gold);letter-spacing:1px">COMMAND CENTER</div></div>
<div style="display:flex;align-items:center;gap:14px">
<div style="text-align:right"><div style="font-size:10px;color:var(--muted)">Last refresh</div><div class="mono" style="font-size:12px" id="ts">—</div></div>
<div id="dot" style="width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)"></div>
<button onclick="fetchAll()" style="background:var(--navy-m);border:1px solid var(--slate);color:var(--gold);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;letter-spacing:1px;font-family:inherit">REFRESH</button>
<a href="/cmd-9x7k2m/analytics.html" style="font-size:11px;color:var(--cyan);text-decoration:none;border:1px solid var(--slate);padding:8px 14px;border-radius:8px">Analytics →</a>
</div></div>
<div class="tabs" id="tabs"><button class="tab active" data-t="overview">Overview</button><button class="tab" data-t="pipeline">Pipeline</button><button class="tab" data-t="agents">Agents</button><button class="tab" data-t="contacts">Contacts</button></div>
<div class="content" id="content"></div>
<div class="footer">OPERATION OVERWATCH — FIRST UNICORN GROUP — AUTO-REFRESH 60s</div>
<script>
const SU="https://eoxkpgtcoxioqiehidys.supabase.co",SK="sb_publishable_gEdt8FMXHgm9zjRfNXL5ww_sO-za28H";
let D={},activeTab="overview";
async function q(t,p=""){try{const r=await fetch(`${SU}/rest/v1/${t}?${p}`,{headers:{apikey:SK,Authorization:`Bearer ${SK}`,Prefer:"count=exact"}});const c=r.headers.get("content-range");const d=await r.json();return{data:Array.isArray(d)?d:[],count:c?parseInt(c.split("/")[1])||0:Array.isArray(d)?d.length:0}}catch(e){return{data:[],count:0}}}
async function fetchAll(){
document.getElementById("dot").style.background="var(--orange)";
const[companies,contacts,opportunities,projects,expenses,invoices,agents,interactions,staff,pipeline]=await Promise.all([
q("companies","select=*"),q("contacts","select=*&order=created_at.desc&limit=20"),q("opportunities","select=*&order=created_at.desc"),
q("projects","select=*"),q("expenses","select=*&order=created_at.desc&limit=50"),q("invoices","select=*&order=created_at.desc"),
q("agents","select=*&order=name"),q("interactions","select=*&order=created_at.desc&limit=20"),q("staff","select=*"),q("pipeline_stages","select=*&order=sort_order")]);
D={companies,contacts,opportunities,projects,expenses,invoices,agents,interactions,staff,pipeline,
totExp:expenses.data.reduce((s,e)=>s+parseFloat(e.amount||e.total_amount||0),0),
totInv:invoices.data.reduce((s,i)=>s+parseFloat(i.total_amount||i.amount||0),0)};
document.getElementById("dot").style.background="var(--green)";
document.getElementById("ts").textContent=new Date().toLocaleTimeString("en-AE",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
render()}
function render(){const c=document.getElementById("content");const fn={overview:rOverview,pipeline:rPipeline,agents:rAgents,contacts:rContacts};c.innerHTML=(fn[activeTab]||fn.overview)()}
function rOverview(){return`<div class="grid">
<div class="card"><div class="card-acc" style="background:var(--cyan)"></div><div class="card-h">Assets (28 Feb)</div><div class="card-b">
<div class="met"><div class="mv" style="color:var(--cyan)">AED 404,622</div><div class="ml">Total Assets</div></div>
<div class="met"><div class="mv" style="color:var(--green)">AED 319,349</div><div class="ml">Liquid Cash</div></div>
${[{n:"RAK Bank (FUI)",b:"221,149"},{n:"Wio FUI",b:"11,300"},{n:"Wio LAMAA",b:"6,900"},{n:"ADCB Renu",b:"17,000"},{n:"Cash",b:"63,000"},{n:"Gold/Silver",b:"85,273"}].map(a=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px"><span style="color:var(--muted)">${a.n}</span><span class="mono">AED ${a.b}</span></div>`).join('')}
</div></div>
<div class="card"><div class="card-acc" style="background:var(--red)"></div><div class="card-h">Monthly Obligations</div><div class="card-b">
<div class="met"><div class="mv" style="color:var(--red)">AED 30,240</div><div class="ml">Total Monthly Burn</div></div>
${[{n:"Tareq (last day)",a:"16,500",u:"Jun 26"},{n:"RERA (22nd)",a:"4,800",u:"Nov 26"},{n:"Salaries",a:"8,500",u:"Ongoing"},{n:"AI+Infra",a:"440",u:"Ongoing"}].map(b=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px"><span>${b.n}</span><span class="mono" style="color:var(--orange)">AED ${b.a}</span></div>`).join('')}
<div class="alert a-gold">Runway: ~10 months (zero revenue)</div>
</div></div>
<div class="card"><div class="card-acc" style="background:var(--red)"></div><div class="card-h">Travel Ban</div><div class="card-b">
<div class="met"><div class="mv" style="color:var(--red)">AED 148,774</div><div class="ml">Gross to Clear</div></div>
<div class="met"><div class="mv" style="color:var(--gold)">AED ~44,574</div><div class="ml">NET by June (after recovery + RERA payments)</div></div>
<div class="alert a-green">One project clears this</div>
</div></div>
<div class="card"><div class="card-acc" style="background:var(--green)"></div><div class="card-h">Revenue & Ads</div><div class="card-b">
<div class="met"><div class="mv" style="color:var(--green)">AED 128K/yr</div><div class="ml">AMC Contract (Al Wasl, 32K/quarter)</div></div>
<div style="padding:10px;background:var(--navy-m);border-radius:8px;margin-top:8px"><div style="font-weight:700;color:var(--orange)">Google Ads: NOT LIVE</div><div style="font-size:11px;color:var(--muted)">Monday launch | AED 85/day | Pool = 125 conversions</div></div>
</div></div>
<div class="card"><div class="card-acc" style="background:var(--cyan)"></div><div class="card-h">Supabase (Live Data)</div><div class="card-b">
${[{n:"Companies",c:D.companies?.count||0},{n:"Contacts",c:D.contacts?.count||0},{n:"Opportunities",c:D.opportunities?.count||0},{n:"Projects",c:D.projects?.count||0},{n:"Expenses",c:D.expenses?.count||0},{n:"Invoices",c:D.invoices?.count||0},{n:"Agents",c:D.agents?.count||0}].map(t=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span>${t.n}</span><span class="mono" style="color:var(--cyan)">${t.c}</span></div>`).join('')}
</div></div>
<div class="card"><div class="card-acc" style="background:var(--green)"></div><div class="card-h">Systems</div><div class="card-b">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
${[{n:"Houston",d:"Telegram"},{n:"Sarah",d:"WhatsApp"},{n:"Supabase",d:"35 tables"},{n:"OneDrive",d:"Connected"},{n:"Briefing",d:"0800 GST"},{n:"Backup",d:"Midnight"},{n:"Watchdog",d:"Every 5m"},{n:"GitHub",d:"Pipeline live"}].map(s=>`<div style="padding:6px 8px;background:var(--navy-m);border-radius:6px"><div style="display:flex;align-items:center"><div class="dot" style="background:var(--green)"></div><span style="font-size:11px;font-weight:600">${s.n}</span></div><div style="font-size:10px;color:var(--muted);margin-left:14px">${s.d}</div></div>`).join('')}
</div></div></div>
<div class="card span2"><div class="card-acc" style="background:var(--purple)"></div><div class="card-h">Upcoming Payments</div><div class="card-b">
${[{d:"22 Mar",l:"RERA",a:"4,800",c:"var(--red)"},{d:"31 Mar",l:"Tareq #1",a:"16,500",c:"var(--red)"},{d:"1 Apr",l:"AMC Income",a:"+32,000",c:"var(--green)"},{d:"22 Apr",l:"RERA",a:"4,800",c:"var(--red)"},{d:"30 Apr",l:"Tareq #2",a:"16,500",c:"var(--red)"},{d:"Jun",l:"Avant Corp",a:"+85,000",c:"var(--green)"},{d:"30 Jun",l:"Tareq FINAL",a:"16,500",c:"var(--gold)"}].map(e=>`<div style="display:flex;align-items:center;gap:14px;padding:6px 0;border-bottom:1px solid rgba(42,58,82,.15)"><div class="mono" style="min-width:60px;font-size:11px;color:${e.c}">${e.d}</div><div style="font-size:12px;font-weight:600">${e.l}</div><div style="margin-left:auto" class="mono" style="font-size:12px;color:${e.c}">AED ${e.a}</div></div>`).join('')}
</div></div>
</div>`}
function rPipeline(){return`<div class="grid1">
<div class="card"><div class="card-acc" style="background:var(--cyan)"></div><div class="card-h">Pipeline (${D.pipeline?.count||0} stages)</div><div class="card-b"><table><thead><tr><th>Stage</th><th class="tdr">Order</th></tr></thead><tbody>${(D.pipeline?.data||[]).slice(0,15).map(s=>`<tr><td style="color:var(--cyan)">${s.stage_name||s.name||'—'}</td><td class="tdr mono" style="color:var(--muted)">${s.sort_order||'—'}</td></tr>`).join('')||'<tr><td colspan="2" style="text-align:center;color:var(--slate);padding:20px">Stages configured — awaiting deals</td></tr>'}</tbody></table></div></div>
<div class="card"><div class="card-acc" style="background:var(--green)"></div><div class="card-h">Opportunities (${D.opportunities?.count||0})</div><div class="card-b"><table><thead><tr><th>Name</th><th class="tdr">Value</th><th>Status</th></tr></thead><tbody>${(D.opportunities?.data||[]).map(o=>`<tr><td>${o.name||o.title||'—'}</td><td class="tdr mono" style="color:var(--green)">${o.value?'AED '+parseFloat(o.value).toLocaleString():'—'}</td><td style="color:var(--muted)">${o.status||'new'}</td></tr>`).join('')||'<tr><td colspan="3" style="text-align:center;color:var(--slate);padding:20px">No opportunities yet — Google Ads launch Monday</td></tr>'}</tbody></table></div></div></div>`}
function rAgents(){return`<div class="grid">${(D.agents?.data||[]).map(a=>{const col=a.status==='live'?'var(--green)':a.status==='built'?'var(--orange)':'var(--muted)';return`<div class="card"><div class="card-acc" style="background:${col}"></div><div class="card-h">${a.display_name||a.name}</div><div class="card-b"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div class="dot" style="background:${col}"></div><span style="font-size:13px;font-weight:700;color:${col};text-transform:uppercase">${a.status||'planned'}</span></div><div style="font-size:11px;color:var(--muted)">${a.description||''}</div></div></div>`}).join('')}</div>`}
function rContacts(){return`<div class="grid1">
<div class="card"><div class="card-acc" style="background:var(--blue)"></div><div class="card-h">Contacts (${D.contacts?.count||0})</div><div class="card-b"><table><thead><tr><th>Name</th><th>Phone</th><th>Source</th><th>Created</th></tr></thead><tbody>${(D.contacts?.data||[]).map(c=>`<tr><td>${c.full_name||c.name||'—'}</td><td class="mono" style="color:var(--cyan)">${c.phone||'—'}</td><td style="color:var(--orange)">${c.source||'—'}</td><td style="color:var(--muted)">${c.created_at?new Date(c.created_at).toLocaleDateString('en-AE'):'—'}</td></tr>`).join('')||'<tr><td colspan="4" style="text-align:center;color:var(--slate);padding:20px">No contacts yet — awaiting first leads</td></tr>'}</tbody></table></div></div></div>`}
document.getElementById("tabs").addEventListener("click",e=>{if(e.target.classList.contains("tab")){document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));e.target.classList.add("active");activeTab=e.target.dataset.t;render()}});
fetchAll();setInterval(fetchAll,60000);
</script>
</body>
</html>
