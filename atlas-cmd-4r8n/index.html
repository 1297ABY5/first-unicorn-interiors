<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-primary);color:#e0e0e0;padding:20px;line-height:1.6}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:1px solid #222;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.header h1{font-size:1.4rem;color:var(--gold)}
.header .stats{font-size:.82rem;color:#666}
.summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:24px}
.summary-card{background:var(--bg-secondary);border:1px solid rgba(0,0,0,0.08);border-radius:8px;padding:12px;text-align:center}
.summary-card .num{font-size:1.5rem;font-weight:700;color:var(--gold)}
.summary-card .lbl{font-size:.65rem;color:#666;text-transform:uppercase;letter-spacing:1px}
.section{margin-bottom:28px}
.section-title{font-size:.85rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #1e1b16;display:flex;justify-content:space-between;align-items:center}
.section-count{color:#555;font-weight:400;font-size:.78rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:5px}
a{color:var(--text-secondary,#5A5A5A);text-decoration:none;display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:6px;font-size:.82rem;transition:all .15s;border:1px solid transparent}
a:hover{background:var(--bg-secondary);border-color:#222;color:var(--gold)}
.badge{font-size:.58rem;padding:2px 7px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.badge-new{background:var(--gold)20;color:var(--gold)}.badge-service{background:#22c55e15;color:#22c55e}
.badge-community{background:#3b82f615;color:#3b82f6}.badge-apartment{background:#06b6d415;color:#06b6d4}
.badge-guide{background:#a855f715;color:#a855f7}.badge-buying{background:#ec489915;color:#ec4899}
.badge-cost{background:#f59e0b15;color:#f59e0b}.badge-handover{background:#14b8a615;color:#14b8a6}
.badge-developer{background:#8b5cf615;color:#8b5cf6}.badge-blog{background:#f59e0b15;color:#f59e0b}
.badge-admin{background:#ef444420;color:#ef4444}.badge-page{background:#64748b15;color:#64748b}
.badge-referral{background:#10b98115;color:#10b981}
.search{width:100%;padding:12px 16px;background:var(--bg-secondary);border:1px solid rgba(0,0,0,0.08);border-radius:8px;color:#e0e0e0;font-size:.9rem;margin-bottom:20px}
.search:focus{outline:none;border-color:var(--gold)}
.note{font-size:.7rem;color:#555;margin-left:auto;white-space:nowrap}
.tag-new{background:#22c55e;color:#000;font-size:.55rem;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:4px}
</style>
</head>

const fl=d.i.filter(([a,b,c])=>!f||a.toLowerCase().includes(f)||b.toLowerCase().includes(f)||c.toLowerCase().includes(f));

if(['badge-service','badge-new'].includes(d.b))c.s+=fl.length;
if(['badge-community','badge-apartment'].includes(d.b))c.co+=fl.length;
if(['badge-guide','badge-buying','badge-cost','badge-handover','badge-developer'].includes(d.b))c.g+=fl.length;
if(d.b==='badge-blog')c.bl+=fl.length;
if(d.b==='badge-page')c.cr+=fl.length;
h+=`<div class="section"><div class="section-title">${sec}<span class="section-count">${fl.length}</span></div><div class="grid">`;
for(const[nm,url,nt]of fl){
const nw=nt.includes('NEW')?'<span class="tag-new">NEW</span>':'';
const ntH=nt?`<span class="note">${nt}</span>`:'';
h+=`<a href="${B+url}" target="_blank"><span class="badge ${d.b}">${sec.split('—')[0].split('(')[0].trim().split(' ')[0]}</span>${nm}${nw}${ntH}</a>`;
}h+='</div></div>';}

document.getElementById('s-total').textContent=n;
document.getElementById('s-svc').textContent=c.s;
document.getElementById('s-com').textContent=c.co;
document.getElementById('s-guide').textContent=c.g;
document.getElementById('s-blog').textContent=c.bl;
document.getElementById('s-core').textContent=c.cr;
}
document.getElementById('search').addEventListener('input',e=>render(e.target.value));
