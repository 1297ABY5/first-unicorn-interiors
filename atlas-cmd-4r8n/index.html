<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#e0e0e0;padding:20px;line-height:1.6}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:1px solid #222;margin-bottom:24px}
.header h1{font-size:1.4rem;color:#b79557}
.header .stats{font-size:.85rem;color:#666}
.section{margin-bottom:32px}
.section-title{font-size:1rem;font-weight:700;color:#b79557;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #1a1a1a}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
a{color:#ccc;text-decoration:none;display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;font-size:.85rem;transition:all .15s;border:1px solid transparent}
a:hover{background:#141414;border-color:#222;color:#b79557}
.badge{font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge-new{background:#b7955720;color:#b79557}
.badge-service{background:#22c55e15;color:#22c55e}
.badge-community{background:#3b82f615;color:#3b82f6}
.badge-guide{background:#a855f715;color:#a855f7}
.badge-blog{background:#f59e0b15;color:#f59e0b}
.badge-admin{background:#ef444420;color:#ef4444}
.badge-page{background:#64748b15;color:#64748b}
.search{width:100%;padding:12px 16px;background:#141414;border:1px solid #222;border-radius:8px;color:#e0e0e0;font-size:.9rem;margin-bottom:24px}
.search:focus{outline:none;border-color:#b79557}
.count{font-size:.75rem;color:#555;margin-left:auto}
.section-count{color:#555;font-weight:400;font-size:.85rem}
</style>
</head>

</div>

const BASE = 'https://firstunicorninteriors.com';
let totalPages = 0;

function render(filter='') {
  const f = filter.toLowerCase();
  let html = '';
  let shown = 0;
  
  for (const [section, data] of Object.entries(PAGES)) {
    const filtered = data.items.filter(([name, url, note]) => 
      !f || name.toLowerCase().includes(f) || url.toLowerCase().includes(f) || note.toLowerCase().includes(f)
    );
    if (filtered.length === 0) continue;
    shown += filtered.length;
    
    html += `<div class="section">
      <div class="section-title">${section} <span class="section-count">(${filtered.length})</span></div>
      <div class="grid">`;
    
    for (const [name, url, note] of filtered) {
      const fullUrl = BASE + url;
      const noteHtml = note ? `<span style="color:#555;font-size:.75rem">${note}</span>` : '';
      html += `<a href="${fullUrl}" target="_blank">
        <span class="badge ${data.badge}">${section.split(' ')[0]}</span>
        ${name}
        ${noteHtml}
      </a>`;
    }
    html += '</div></div>';
  }
  
  document.getElementById('content').innerHTML = html;
  document.getElementById('stats').textContent = `${shown} pages shown / 208 total / ${new Date().toLocaleDateString('en-GB')}`;
}

// Count total
for (const data of Object.values(PAGES)) totalPages += data.items.length;

// Search
document.getElementById('search').addEventListener('input', e => render(e.target.value));

// Initial render
render();
